<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Flying Limited</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // 移除外部依赖，使用内联 SVG 组件
      const Icon = ({ children, size = 24, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {children}
        </svg>
      );

      const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
      const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
      const Target = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
      const PenTool = (props) => <Icon {...props}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></Icon>;
      const MonitorPlay = (props) => <Icon {...props}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M10 7l5 3-5 3z"/><path d="M12 17v4"/><path d="M8 21h8"/></Icon>;
      const Rocket = (props) => <Icon {...props}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></Icon>;
      const Mail = (props) => <Icon {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
      const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
      const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
      const ArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
      const CheckCircle2 = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;

      const Navbar = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => setScrolled(window.scrollY > 50);
          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const navLinks = [
          { name: '首页', href: '#home' },
          { name: '关于我们', href: '#about' },
          { name: '核心服务', href: '#services' },
        ];

        return (
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-slate-900/95 backdrop-blur-sm py-4 shadow-lg' : 'bg-transparent py-6'}`}>
            <div className="container mx-auto px-6 md:px-12 flex justify-between items-center">
              <div className="flex items-center gap-2 text-2xl font-bold text-white">
                <div className="w-8 h-8 bg-amber-400 rounded-bl-xl rounded-tr-xl flex items-center justify-center text-slate-900">
                  <Rocket size={20} />
                </div>
                <span>Golden <span className="text-amber-400">Flying</span></span>
              </div>

              <div className="hidden md:flex items-center space-x-8">
                {navLinks.map((link) => (
                  <a key={link.name} href={link.href} className="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium">
                    {link.name}
                  </a>
                ))}
                <a href="#contact" className="bg-amber-400 text-slate-900 px-6 py-2.5 rounded-full font-semibold hover:bg-amber-300 transition-all transform hover:scale-105 shadow-lg shadow-amber-400/30">
                  联系我们
                </a>
              </div>

              <button className="md:hidden text-white" onClick={() => setIsOpen(!isOpen)}>
                {isOpen ? <X size={28} /> : <Menu size={28} />}
              </button>
            </div>

            {isOpen && (
              <div className="md:hidden absolute top-full left-0 w-full bg-slate-900 border-t border-slate-800 py-4 shadow-xl">
                <div className="flex flex-col space-y-4 px-6">
                  {navLinks.map((link) => (
                    <a key={link.name} href={link.href} className="text-gray-300 hover:text-amber-400 py-2 text-lg" onClick={() => setIsOpen(false)}>
                      {link.name}
                    </a>
                  ))}
                  <a href="#contact" className="bg-amber-400 text-slate-900 text-center px-6 py-3 rounded-lg font-semibold mt-4" onClick={() => setIsOpen(false)}>
                    免费获取方案
                  </a>
                </div>
              </div>
            )}
          </nav>
        );
      };

      const Hero = () => {
        return (
          <section id="home" className="relative min-h-screen flex items-center pt-20 bg-slate-950 overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
              <div className="absolute top-[20%] left-[10%] w-96 h-96 bg-amber-500/10 rounded-full blur-3xl"></div>
              <div className="absolute bottom-[10%] right-[10%] w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-3xl"></div>
            </div>

            <div className="container mx-auto px-6 md:px-12 relative z-10">
              <div className="max-w-4xl mx-auto text-center">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/50 border border-slate-700 text-amber-400 text-sm font-medium mb-8">
                  <span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                  领先的创意数字广告机构
                </div>
                <h1 className="text-5xl md:text-7xl font-extrabold text-white leading-tight mb-6">
                  创意点亮品牌 <br />
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500">数据驱动增长</span>
                </h1>
                <p className="text-xl md:text-2xl text-gray-400 mb-10 max-w-2xl mx-auto leading-relaxed">
                  Golden Flying Limited 致力于为您提供全方位、定制化的广告营销解决方案，让您的品牌在数字时代展翅高飞。
                </p>
                <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                  <a href="#contact" className="w-full sm:w-auto px-8 py-4 bg-amber-400 text-slate-900 rounded-full font-bold text-lg hover:bg-amber-300 transition-all flex items-center justify-center gap-2 group">
                    开启品牌增长
                    <ArrowRight size={20} className="group-hover:translate-x-1 transition-transform" />
                  </a>
                </div>
              </div>
            </div>
          </section>
        );
      };

      const Services = () => {
        const services = [
          {
            icon: <Target className="text-amber-400" size={32} />,
            title: '品牌精准定位',
            desc: '深度市场调研与受众分析，为您的品牌打造独一无二的记忆点，在红海中寻找蓝海。'
          },
          {
            icon: <PenTool className="text-amber-400" size={32} />,
            title: '视觉创意设计',
            desc: '屡获殊荣的设计团队，提供从VI系统到广告海报、交互体验的全案视觉包装。'
          },
          {
            icon: <MonitorPlay className="text-amber-400" size={32} />,
            title: '全域数字营销',
            desc: '整合社交媒体、搜索引擎及短视频平台，打造品效合一的数字化传播矩阵。'
          },
          {
            icon: <Rocket className="text-amber-400" size={32} />,
            title: '媒体投放策略',
            desc: '依托大数据算法模型，优化每一次点击的ROI，让您的每一分广告预算都花在刀刃上。'
          }
        ];

        return (
          <section id="services" className="py-24 bg-slate-900">
            <div className="container mx-auto px-6 md:px-12">
              <div className="text-center mb-16">
                <h2 className="text-amber-400 font-semibold tracking-wider uppercase text-sm mb-2">Our Services</h2>
                <h3 className="text-3xl md:text-5xl font-bold text-white mb-6">全链路营销服务</h3>
                <p className="text-gray-400 max-w-2xl mx-auto text-lg">提供从策略策划、创意产出到媒体投放的一站式闭环服务，全方位赋能您的业务增长。</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                {services.map((srv, index) => (
                  <div key={index} className="bg-slate-800/50 border border-slate-700 p-8 rounded-2xl hover:bg-slate-800 transition-colors group">
                    <div className="w-16 h-16 bg-slate-900 rounded-xl flex items-center justify-center mb-6 shadow-inner group-hover:scale-110 transition-transform">
                      {srv.icon}
                    </div>
                    <h4 className="text-xl font-bold text-white mb-3">{srv.title}</h4>
                    <p className="text-gray-400 leading-relaxed text-sm">
                      {srv.desc}
                    </p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const About = () => {
        return (
          <section id="about" className="py-24 bg-slate-950 text-white relative">
            <div className="container mx-auto px-6 md:px-12">
              <div className="flex flex-col lg:flex-row items-center gap-16">
                <div className="lg:w-1/2">
                  <div className="relative">
                    <img
                      src="./team-illustration.svg"
                      alt="Golden Flying 创意团队插图"
                      className="rounded-2xl shadow-2xl z-10 relative w-full h-auto object-cover"
                      loading="lazy"
                    />
                    <div className="absolute -bottom-6 -right-6 w-48 h-48 bg-amber-400 rounded-2xl -z-0"></div>
                  </div>
                </div>
                <div className="lg:w-1/2">
                  <h2 className="text-amber-400 font-semibold tracking-wider uppercase text-sm mb-2">About Golden Flying</h2>
                  <h3 className="text-3xl md:text-4xl font-bold mb-6">连接品牌与未来<br />创造非凡商业价值</h3>
                  <p className="text-gray-400 text-lg mb-8 leading-relaxed">
                    Golden Flying Limited 成立于行业变革的浪潮中。我们相信，伟大的品牌不仅需要被看见，更需要被热爱。作为一家以创意为核、数据为翼的综合性广告公司，我们已助力数百家企业实现业绩与品牌影响力的双重跨越。
                  </p>

                  <div className="space-y-4 mb-10">
                    {[
                      '逾 10 年行业深耕经验',
                      '服务过超过 300+ 知名企业及初创品牌',
                      '荣获多项国内外数字营销及创意设计大奖',
                      '全球化视野与本地化洞察完美结合'
                    ].map((item, i) => (
                      <div key={i} className="flex items-center gap-3">
                        <CheckCircle2 className="text-amber-400 flex-shrink-0" size={20} />
                        <span className="text-gray-300">{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      };

      const Contact = () => {
        const [submitted, setSubmitted] = useState(false);

        const handleSubmit = (e) => {
          e.preventDefault();
          setSubmitted(true);
        };

        return (
          <section id="contact" className="py-24 bg-slate-900 relative">
            <div className="container mx-auto px-6 md:px-12">
              <div className="bg-slate-800 rounded-3xl overflow-hidden shadow-2xl flex flex-col lg:flex-row">
                <div className="lg:w-2/5 bg-slate-950 p-12 lg:p-16 text-white flex flex-col justify-between">
                  <div>
                    <h3 className="text-3xl font-bold mb-4">准备好起飞了吗？</h3>
                    <p className="text-gray-400 mb-12">留下您的联系方式和需求，我们的专家团队将在 24 小时内与您取得联系，为您量身定制广告增长方案。</p>

                    <div className="space-y-6">
                      <div className="flex items-start gap-4">
                        <Phone className="text-amber-400 mt-1" size={24} />
                        <div>
                          <h4 className="text-sm text-gray-400 font-medium">联系电话</h4>
                          <p className="text-lg">+86-18058112334</p>
                        </div>
                      </div>
                      <div className="flex items-start gap-4">
                        <Mail className="text-amber-400 mt-1" size={24} />
                        <div>
                          <h4 className="text-sm text-gray-400 font-medium">电子邮箱</h4>
                          <p className="text-lg">hello@goldenflying.com</p>
                        </div>
                      </div>
                      <div className="flex items-start gap-4">
                        <MapPin className="text-amber-400 mt-1" size={24} />
                        <div>
                          <h4 className="text-sm text-gray-400 font-medium">公司地址</h4>
                          <p className="text-lg leading-relaxed">UNIT E01 10/F WONG KING INDUSTRIAL BUILDING 2-4 TAI YAU STREET SAN PO KONG KL</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:w-3/5 p-12 lg:p-16">
                  {submitted ? (
                    <div className="h-full min-h-[420px] bg-slate-900 border border-slate-700 rounded-2xl p-8 md:p-10 flex flex-col justify-center items-start">
                      <div className="w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center mb-6">
                        <CheckCircle2 size={32} />
                      </div>
                      <h3 className="text-3xl font-bold text-white mb-4">提交成功</h3>
                      <p className="text-gray-300 text-lg leading-relaxed mb-8">
                        感谢您的询盘，我们已收到您的信息。顾问团队会尽快与您回电沟通，请保持电话畅通。
                      </p>
                      <button type="button" onClick={() => setSubmitted(false)} className="px-6 py-3 bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold rounded-lg transition-colors">
                        继续提交新询盘
                      </button>
                    </div>
                  ) : (
                    <>
                      <h3 className="text-2xl font-bold text-white mb-8">在线咨询</h3>
                      <form className="space-y-6" onSubmit={handleSubmit}>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div>
                            <label className="block text-sm font-medium text-gray-400 mb-2">您的姓名</label>
                            <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-colors" placeholder="如：王先生" />
                          </div>
                          <div>
                            <label className="block text-sm font-medium text-gray-400 mb-2">联系电话</label>
                            <input type="tel" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-colors" placeholder="您的手机号码" />
                          </div>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-400 mb-2">公司/品牌名称</label>
                          <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-colors" placeholder="贵公司的名称" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-400 mb-2">需求简述</label>
                          <textarea rows="4" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 transition-colors resize-none" placeholder="请简单描述您想了解的服务（如品牌设计、广告投放等）..."></textarea>
                        </div>
                        <button type="submit" className="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-bold text-lg py-4 rounded-lg transition-colors shadow-lg shadow-amber-400/20">
                          提交询盘
                        </button>
                      </form>
                    </>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      };

      const Footer = () => {
        return (
          <footer className="bg-slate-950 text-gray-400 py-12 border-t border-slate-800">
            <div className="container mx-auto px-6 md:px-12">
              <div className="flex justify-center items-center">
                <div className="flex items-center gap-2 text-xl font-bold text-white">
                  <div className="w-6 h-6 bg-amber-400 rounded-bl-lg rounded-tr-lg flex items-center justify-center text-slate-900">
                    <Rocket size={14} />
                  </div>
                  <span>Golden <span className="text-amber-400">Flying</span></span>
                </div>
              </div>

              <div className="mt-8 pt-8 border-t border-slate-800 flex justify-center items-center text-sm">
                <p>&copy; {new Date().getFullYear()} Golden Flying Limited. 保留所有权利。</p>
              </div>
            </div>
          </footer>
        );
      };

      function App() {
        return (
          <div className="font-sans antialiased text-slate-50 selection:bg-amber-400 selection:text-slate-900">
            <Navbar />
            <Hero />
            <Services />
            <About />
            <Contact />
            <Footer />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
